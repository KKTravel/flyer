<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flyer 翻面</title>
  <style>
    :root{
      --bg: #0b0f17;
      --panel: rgba(255,255,255,.06);
      --border: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);
      --btn: rgba(255,255,255,.10);
      --btnHover: rgba(255,255,255,.16);
      --radius: 14px;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --bar-h: 56px;
    }
    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .topbar{
      position: sticky;
      top: 0;
      z-index: 50;
      height: var(--bar-h);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
    }
    .title{
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 55vw;
    }
    .actions{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

    button{
      appearance:none;
      border: 1px solid var(--border);
      background: var(--btn);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      user-select:none;
    }
    button:hover{ background: var(--btnHover); }
    button:disabled{ opacity:.55; cursor:not-allowed; }

    .wrap{
      min-height: calc(100svh - var(--bar-h));
      display:grid;
      place-items:center;
      padding: 18px 12px 22px;
      gap: 12px;
    }

    /* 翻面舞台 */
    .stage{
      width: min(560px, 92vw);
      perspective: 1200px;
    }
    .card{
      width: 100%;
      /* 直式傳單常見比例（不影響圖片完整顯示，因為用 contain） */
      aspect-ratio: 9 / 16;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 700ms cubic-bezier(.2,.8,.2,1);
      border-radius: var(--radius);
      outline: none;
      cursor: pointer;
    }
    .card.is-flipped{ transform: rotateY(180deg); }

    .side{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border-radius: var(--radius);
      overflow:hidden;
      box-shadow: var(--shadow);
      background: #111;
      display:grid;
      place-items:center;
    }
    .side.back{ transform: rotateY(180deg); }

    img{
      width:100%;
      height:100%;
      object-fit: contain; /* 完整顯示，不裁切 */
      display:block;
      background: #0f1320;
    }

    .hint{
      color: var(--muted);
      font-size: 13px;
      line-height:1.6;
      text-align:center;
      max-width:min(560px, 92vw);
    }

    /* 全屏退出按鈕 */
    .exit-fs{
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9999;
      display: none;
    }
    body.is-fullscreen .exit-fs{ display:inline-flex; }

    /* 全屏時可選：把上方工具列隱藏，畫面更滿 */
    body.is-fullscreen .topbar{ display:none; }
    body.is-fullscreen .wrap{ min-height: 100svh; padding-top: 12px; }

    @media (prefers-reduced-motion: reduce){
      .card{ transition:none; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">Flyer（點圖片可翻面）</div>
    <div class="actions">
      <button id="btnFront" type="button">正面</button>
      <button id="btnFlip" type="button">翻面</button>
      <button id="btnBack" type="button">背面</button>
      <button id="btnEnterFs" type="button">全屏</button>
    </div>
  </div>

  <div class="wrap">
    <div class="stage" id="stage">
      <div class="card" id="card" tabindex="0" aria-label="傳單翻面（點擊或按 Enter/空白鍵 翻面）">
        <div class="side front">
          <img src="./P1.png" alt="P1 正面" />
        </div>
        <div class="side back">
          <img src="./P2.png" alt="P2 背面" />
        </div>
      </div>
    </div>

    <div class="hint">
      操作：點圖片翻面；或用按鈕切換正/背面。全屏後右上角會出現「退出全屏」。
    </div>
  </div>

  <button class="exit-fs" id="btnExitFs" type="button">退出全屏</button>

  <script>
    const card = document.getElementById("card");
    const stage = document.getElementById("stage");

    const btnFront = document.getElementById("btnFront");
    const btnFlip  = document.getElementById("btnFlip");
    const btnBack  = document.getElementById("btnBack");
    const btnEnterFs = document.getElementById("btnEnterFs");
    const btnExitFs  = document.getElementById("btnExitFs");

    function setFlipped(on){
      card.classList.toggle("is-flipped", on);
    }
    function toggleFlip(){
      card.classList.toggle("is-flipped");
    }

    // 點卡片翻面
    card.addEventListener("click", toggleFlip);

    // 鍵盤 Enter / Space 翻面
    card.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        toggleFlip();
      }
    });

    btnFront.addEventListener("click", () => setFlipped(false));
    btnBack.addEventListener("click",  () => setFlipped(true));
    btnFlip.addEventListener("click",  toggleFlip);

    // 全屏
    async function enterFullscreen(){
      if (!document.fullscreenEnabled) return;
      await stage.requestFullscreen();
    }
    async function exitFullscreen(){
      if (document.fullscreenElement) await document.exitFullscreen();
    }

    btnEnterFs.addEventListener("click", enterFullscreen);
    btnExitFs.addEventListener("click", exitFullscreen);

    function syncFS(){
      const isFs = !!document.fullscreenElement;
      document.body.classList.toggle("is-fullscreen", isFs);
      btnEnterFs.disabled = isFs;
    }
    document.addEventListener("fullscreenchange", syncFS);
    syncFS();
  </script>
</body>
</html>
