<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flyer</title>
  <style>
    :root{
      --radius: 14px;
      --shadow: 0 18px 50px rgba(0,0,0,.22);

      --btn-bg: rgba(255,255,255,.78);
      --btn-bg-hover: rgba(255,255,255,.92);
      --btn-border: rgba(0,0,0,.14);
      --btn-text: rgba(0,0,0,.82);

      --fs-bg: #0b0f17;
      --fs-btn-bg: rgba(255,255,255,.12);
      --fs-btn-bg-hover: rgba(255,255,255,.18);
      --fs-btn-border: rgba(255,255,255,.14);
      --fs-btn-text: rgba(255,255,255,.92);

      --gap: 16px;

      /* 預設 A4 寬/高；載入後 JS 會覆蓋成實際比例 */
      --ratio: calc(210 / 297);
    }

    *{ box-sizing:border-box; }

    /* 外層不滾，讓 #app 自己滾：避免雙滾軸 */
    html, body{
      height: 100%;
      margin: 0;
      background: transparent;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    }

    /* 讓 flyer 頁面右側出現滾軸（內容超出就可捲） */
    #app{
      height: 100svh;
      overflow-y: auto;       /* 想永遠顯示滾軸→改成 scroll */
      overflow-x: hidden;
      scrollbar-gutter: stable;

      background: transparent;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
    }

    /* 改成「以寬為主」：會放大，超出高度就靠滾軸 */
    .stage{
      width: min(1100px, calc(100vw - (var(--gap) + env(safe-area-inset-left) + env(safe-area-inset-right))));
      padding: 0;
      perspective: 1200px;
      margin: 0 auto;
    }

    .card{
      width: 100%;
      aspect-ratio: 210 / 297; /* 預設，JS 會用 P1 真實比例覆蓋 */
      position: relative;
      transform-style: preserve-3d;
      transition: transform 700ms cubic-bezier(.2,.8,.2,1);
      border-radius: var(--radius);
      outline: none;
      cursor: pointer;
    }
    .card.is-flipped{ transform: rotateY(180deg); }

    .side{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border-radius: var(--radius);
      overflow:hidden;
      box-shadow: var(--shadow);
      background: transparent;
      display:grid;
      place-items:center;
    }
    .side.back{ transform: rotateY(180deg); }

    img{
      width:100%;
      height:100%;
      object-fit: contain;
      display:block;
      background: transparent;
    }

    .controls{
      position: fixed;
      top: calc(12px + env(safe-area-inset-top));
      right: calc(12px + env(safe-area-inset-right));
      z-index: 9999;
      display:flex;
      gap: 8px;
      align-items:center;
    }

    button, a.btn{
      appearance:none;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--btn-text);
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      user-select:none;
      text-decoration: none;
      display:inline-flex;
      align-items:center;
      box-shadow: 0 10px 26px rgba(0,0,0,.12);
      backdrop-filter: blur(10px);
    }
    button:hover, a.btn:hover{ background: var(--btn-bg-hover); }

    /* 全屏狀態 */
    #app.is-fs{
      background: var(--fs-bg);
    }
    #app.is-fs button,
    #app.is-fs a.btn{
      border: 1px solid var(--fs-btn-border);
      background: var(--fs-btn-bg);
      color: var(--fs-btn-text);
      box-shadow: 0 10px 26px rgba(0,0,0,.35);
    }
    #app.is-fs button:hover,
    #app.is-fs a.btn:hover{
      background: var(--fs-btn-bg-hover);
    }

    #btnExitFs{ display:none; }
    #app.is-fs #btnExitFs{ display:inline-flex; }
    #app.is-fs #btnEnterFs{ display:none; }

    @media (prefers-reduced-motion: reduce){
      .card{ transition:none; }
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="stage">
      <div class="card" id="card" tabindex="0" aria-label="傳單翻面（點擊或按 Enter/空白鍵 翻面）">
        <div class="side front"><img id="imgFront" src="./P1.png" alt="P1 正面" /></div>
        <div class="side back"><img id="imgBack"  src="./P2.png" alt="P2 背面" /></div>
      </div>
    </div>

    <div class="controls">
      <a class="btn" id="btnPdf" href="#" target="_blank" rel="noopener">PDF</a>
      <button id="btnEnterFs" type="button">全屏</button>
      <button id="btnExitFs" type="button">退出</button>
    </div>
  </div>

  <script>
    const PDF_URL = "https://drive.google.com/file/d/1PsGehBZ4-xpwaP3PkV7tO1vMjlAqe3xH/view?usp=sharing";

    const app = document.getElementById("app");
    const card = document.getElementById("card");
    const imgFront = document.getElementById("imgFront");

    const btnPdf = document.getElementById("btnPdf");
    const btnEnterFs = document.getElementById("btnEnterFs");
    const btnExitFs  = document.getElementById("btnExitFs");

    btnPdf.href = PDF_URL;

    // 用 P1 實際比例覆蓋 aspect-ratio（正反面要同尺寸才最完美）
    function applyAspectFromFront(){
      const w = imgFront.naturalWidth;
      const h = imgFront.naturalHeight;
      if (w && h) {
        card.style.aspectRatio = `${w} / ${h}`;
        document.documentElement.style.setProperty("--ratio", (w / h).toString());
      }
    }
    if (imgFront.complete) applyAspectFromFront();
    imgFront.addEventListener("load", applyAspectFromFront);

    function toggleFlip(){ card.classList.toggle("is-flipped"); }
    card.addEventListener("click", toggleFlip);
    card.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleFlip(); }
    });

    function enterFullscreen(){
      if (app.requestFullscreen) return app.requestFullscreen();
      if (app.webkitRequestFullscreen) return app.webkitRequestFullscreen();
    }
    function exitFullscreen(){
      if (document.exitFullscreen) return document.exitFullscreen();
      if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
    }
    btnEnterFs.addEventListener("click", enterFullscreen);
    btnExitFs.addEventListener("click", exitFullscreen);

    function isFullscreen(){
      return !!(document.fullscreenElement || document.webkitFullscreenElement);
    }
    function syncFS(){
      app.classList.toggle("is-fs", isFullscreen());
    }
    document.addEventListener("fullscreenchange", syncFS);
    document.addEventListener("webkitfullscreenchange", syncFS);
    syncFS();
  </script>
</body>
</html>
